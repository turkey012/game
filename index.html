<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي مانيز برجر</title>
    <style>
        /* إعدادات الصفحة والخلفية */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fff3e0; /* لون دافئ يفتح النفس */
            color: #333; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }

        /* تصميم الكارت الأساسي */
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        /* تصميم اللوجو */
        .brand-logo { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #ff9800; 
            box-shadow: 0 8px 16px rgba(255, 152, 0, 0.2); 
            margin-bottom: 15px; 
        }

        /* العناوين والنصوص */
        h1 { font-size: 28px; margin-bottom: 5px; color: #d35400; font-weight: 800; }
        p { font-size: 16px; color: #7f8c8d; margin-bottom: 25px; font-weight: 600; }

        /* منطقة الإحصائيات (الوقت والضغطات) */
        .stats-container {
            display: flex;
            justify-content: space-around;
            background: #fff8e1;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ffe082;
        }
        .stats { font-size: 18px; font-weight: bold; color: #e65100; }

        /* زر البرجر التفاعلي */
        #burger-btn { 
            font-size: 110px; 
            background: none; 
            border: none; 
            cursor: pointer; 
            user-select: none; 
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin: 15px 0; 
            -webkit-tap-highlight-color: transparent; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15));
        }
        #burger-btn:active { 
            transform: scale(0.85); 
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        /* الأزرار العامة وزر الواتساب */
        .btn { 
            background: linear-gradient(135deg, #ff9800, #f39c12); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
            text-decoration: none; 
            display: inline-block; 
            width: 85%;
            box-shadow: 0 8px 15px rgba(243, 156, 18, 0.3);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(243, 156, 18, 0.4); }
        .whatsapp-btn { 
            background: linear-gradient(135deg, #25D366, #128C7E); 
            box-shadow: 0 8px 15px rgba(37, 211, 102, 0.3); 
        }
        .whatsapp-btn:hover { box-shadow: 0 12px 20px rgba(37, 211, 102, 0.4); }

        /* شاشة النتيجة وكود الخصم */
        #game-area, #result-area { display: block; }
        #result-area { display: none; }
        .discount-code { 
            font-size: 34px; 
            color: #27ae60; 
            font-weight: 900; 
            letter-spacing: 3px; 
            margin: 20px 0; 
            padding: 20px; 
            border: 3px dashed #2ecc71; 
            border-radius: 16px; 
            background-color: #f0fdf4; 
        }
    </style>
</head>
<body>

    <!-- الكارت اللي بيجمع اللعبة كلها -->
    <div class="card">
        
        <div id="game-area">
            <img src="logo.png" alt="Manny's Burger Logo" class="brand-logo">
            
            <h1>تحدي الجوع! 🔥</h1>
            <p>اضغط على البرجر 20 مرة في 10 ثواني</p>
            
            <div class="stats-container">
                <div class="stats" id="timer">⏳ 10 ثواني</div>
                <div class="stats" id="score">🍔 0 ضغطة</div>
            </div>
            
            <button id="burger-btn" onclick="tapBurger()" disabled>🍔</button>
            <br>
            <button class="btn" id="start-btn" onclick="startGame()">ابدأ التحدي دلوقتي</button>
        </div>

        <div id="result-area">
            <img src="logo.png" alt="Manny's Burger Logo" class="brand-logo">
            
            <h1>عاش يا بطل! 🏆</h1>
            <p>خصمك 15% جاهز للاستخدام فوراً</p>
            
            <div class="discount-code" id="unique-code">يتم التجهيز...</div>
            
            <a href="#" id="whatsapp-link" class="btn whatsapp-btn" target="_blank">اطلب على الواتساب 💬</a>
            <button class="btn" style="background: #bdc3c7; box-shadow: none; margin-top: 15px; font-size: 16px; width: 70%;" onclick="location.reload()">العب تاني</button>
        </div>

    </div>

    <script>
        // رقم الواتساب بتاعك
        const restaurantWhatsAppNumber = "201070500094"; 

        let score = 0; let timeLeft = 10; let gameInterval; let isPlaying = false;
        const scoreDisplay = document.getElementById('score'); const timerDisplay = document.getElementById('timer');
        const burgerBtn = document.getElementById('burger-btn'); const startBtn = document.getElementById('start-btn');
        const gameArea = document.getElementById('game-area'); const resultArea = document.getElementById('result-area');
        const uniqueCodeDisplay = document.getElementById('unique-code'); const whatsappLink = document.getElementById('whatsapp-link');

        function generateRandomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let result = 'MB-';
            for (let i = 0; i < 4; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
            return result;
        }

        function startGame() {
            score = 0; timeLeft = 10; isPlaying = true;
            scoreDisplay.innerText = `🍔 ${score} ضغطة`; timerDisplay.innerText = `⏳ ${timeLeft} ثواني`;
            startBtn.style.display = 'none'; burgerBtn.disabled = false;
            gameInterval = setInterval(() => {
                timeLeft--; timerDisplay.innerText = `⏳ ${timeLeft} ثواني`;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function tapBurger() {
            if (!isPlaying) return;
            score++; scoreDisplay.innerText = `🍔 ${score} ضغطة`;
            if (score >= 20) winGame();
        }

        function endGame() {
            clearInterval(gameInterval); isPlaying = false; burgerBtn.disabled = true;
            if (score < 20) { 
                alert("الوقت خلص! ملحقتش المرة دي، بس تقدر تجرب تاني."); 
                startBtn.style.display = 'inline-block'; 
                startBtn.innerText = 'جرب تاني 🔄'; 
            }
        }

        function winGame() {
            clearInterval(gameInterval); isPlaying = false;
            gameArea.style.display = 'none'; resultArea.style.display = 'block';
            const newCode = generateRandomCode(); uniqueCodeDisplay.innerText = newCode;
            const message = `أنا كسبت في تحدي مانيز برجر! 🍔🔥%0Aكود الخصم بتاعي هو: *${newCode}*%0Aعايز أعمل أوردر بخصم 15%`;
            whatsappLink.href = `https://wa.me/${restaurantWhatsAppNumber}?text=${message}`;
        }
    </script>
</body>
</html>
